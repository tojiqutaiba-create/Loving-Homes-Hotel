<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحجز - لوفينغ هومز</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        /* إضافة بسيطة للتأكد من ترتيب زر المسح بجانب زر الحجز */
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        
        /* جعل زر الحجز يأخذ مساحة أكبر قليلاً وشكلاً متناسقاً */
        .btn-booking-form {
            flex: 2;
            border: none;
            cursor: pointer;
            text-align: center;
            display: inline-block;
        }

        /* زر المسح يتبع تصميمك الأصلي */
        .btn-reset-form {
            flex: 1;
            margin-top: 0 !important; /* لإلغاء المارجن الموجود في CSS الأصلي */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.avif" alt="الشعار">
            <span class="logo-text">Loving Homes</span>
        </div>

        <div class="font-controls">
            <button class="font-btn" onclick="changeFontSize(2)" title="تكبير الخط">A+</button>
            <button class="font-btn" onclick="changeFontSize(-2)" title="تصغير الخط">A-</button>
            <button class="font-btn" onclick="resetFontSize()" title="إعادة الضبط">Reset</button>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="facilities.html">المرافق</a></li>
                <li><a href="packages.html">الحزم</a></li>
                <li><a href="contact.html">اتصل بنا</a></li>
                <li><a href="booking.html" class="active btn-booking">احجز الآن</a></li>
            </ul>
        </nav>
    </header>

    <main class="booking-container">
        <h2>نموذج حجز فندقي للكلاب</h2>
        <p>يرجى تعبئة البيانات لحساب التكلفة الإجمالية لإقامة أليفك.</p>

        <form id="bookingForm">
            <div class="form-group">
                <label>اسم صاحب الكلب:</label>
                <input type="text" id="ownerName" required>
            </div>

            <div class="form-group">
                <label>تاريخ الحجز:</label>
                <input type="date" id="bookingDate" required>
            </div>

            <div class="form-group">
                <label>نوع الحزمة:</label>
                <select id="packageType" onchange="calculateTotal()">
                    <option value="700">الحزمة المميزة (700$ / يوم)</option>
                    <option value="500">الحزمة الكلاسيكية (500$ / يوم)</option>
                    <option value="200">حزمة اليوم الواحد (200$ / يوم)</option>
                </select>
            </div>

            <div class="form-group">
                <label>جنس الحيوان:</label>
                <div style="display: flex; gap: 20px; padding: 10px 0;">
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="radio" name="petGender" value="ذكر" required style="width: auto;"> ذكر
                    </label>
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="radio" name="petGender" value="أنثى" style="width: auto;"> أنثى
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>عدد الأيام:</label>
                <input type="number" id="days" min="1" value="1" oninput="calculateTotal()">
            </div>

            <div class="result-box">
                <h3>التكلفة الإجمالية: <span id="totalPrice">700</span> دولار</h3>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-booking btn-booking-form">تأكيد الحجز</button>
                <button type="reset" class="btn-reset btn-reset-form" onclick="resetForm()">مسح</button>
            </div>
        </form>
    </main>

    <footer>
        <div class="social-icons">
            <div class="social-item">
                <div class="social-icon-circle">
                    <a href="#"><img src="whatsapp-icon.png" alt="واتساب"></a>
                </div>
                <span class="social-label">واتساب</span>
            </div>
            <div class="social-item">
                <div class="social-icon-circle">
                    <a href="#"><img src="instagram-icon.png" alt="انستقرام"></a>
                </div>
                <span class="social-label">انستقرام</span>
            </div>
            <div class="social-item">
                <div class="social-icon-circle">
                    <a href="#"><img src="facebook-icon.png" alt="فيسبوك"></a>
                </div>
                <span class="social-label">فيسبوك</span>
            </div>
        </div>
        <p>© 2026 لوفينغ هومز - جميع الحقوق محفوظة</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
