<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحجز - لوفينغ هومز</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-option input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #d4a017;
        }

        .radio-option label {
            cursor: pointer;
            margin: 0;
            font-weight: 500;
            color: #1a3c5e;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.avif" alt="الشعار">
            <span class="logo-text">Loving Homes</span>
        </div>

        <div class="font-controls">
            <button class="font-btn" onclick="changeFontSize(2)" title="تكبير الخط">A+</button>
            <button class="font-btn" onclick="changeFontSize(-2)" title="تصغير الخط">A-</button>
            <button class="font-btn" onclick="resetFontSize()" title="إعادة الضبط" style="font-size: 12px;">Reset</button>
        </div>

                <li><a href="booking.html" class="btn-booking">احجز الآن</a></li>
            </ul>
        </nav>
    </header>

    <main class="booking-container">

        <p>يرجى تعبئة البيانات لحساب التكلفة الإجمالية لإقامة أليفك.</p>

        <form id="bookingForm">

                <label>اسم صاحب الكلب:</label>
                <input type="text" id="ownerName" required>
            </div>

            <div class="form-group">
                <label>تاريخ الحجز:</label>
                <input type="date" id="bookingDate" required>
            </div>
